# Tokyo Night - Night Variant
# https://github.com/enkia/tokyo-night-vscode-theme

# Fonts - FiraCode Nerd Font
font_family      FiraCode Nerd Font
bold_font        FiraCode Nerd Font Bold
italic_font      FiraCode Nerd Font
bold_italic_font FiraCode Nerd Font Bold
font_size 15.0

# Nerd Font symbol mapping (if using non-nerd font as primary)
# symbol_map U+23FB-U+23FE,U+2665,U+26A1,U+2B58,U+E000-U+E00A,U+E0A0-U+E0A3,U+E0B0-U+E0D4,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6AA,U+E700-U+E7C5,U+EA60-U+EBEB,U+F000-U+F2E0,U+F300-U+F32F,U+F400-U+F4A9,U+F500-U+FD46 Symbols Nerd Font Mono

# Font features - ligatures and stylistic sets
font_features FiraCodeNF-Reg +zero +ss01 +ss02 +ss03 +ss04 +ss05 +cv31
font_features FiraCodeNF-Bold +zero +ss01 +ss02 +ss03 +ss04 +ss05 +cv31

# Cursor
cursor_shape block
cursor_blink_interval 0
shell_integration no-cursor

# Tab bar
tab_bar_edge bottom
tab_bar_margin_height 0.0 4.0
tab_bar_style slant
tab_bar_min_tabs 2
tab_title_template "{activity_symbol} {index} {tab.active_exe}"

# Keybindings
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4

# Tokyo Night - Night colors
foreground              #c0caf5
background              #1a1b26
selection_foreground    #c0caf5
selection_background    #283457

# Cursor
cursor                  #c0caf5
cursor_text_color       #1a1b26

# URL
url_color               #73daca

# Window borders
active_border_color     #7aa2f7
inactive_border_color   #414868
bell_border_color       #e0af68

# Titlebar
wayland_titlebar_color  #1a1b26
macos_titlebar_color    #1a1b26

# Tab bar
active_tab_foreground   #1a1b26
active_tab_background   #7aa2f7
inactive_tab_foreground #545c7e
inactive_tab_background #1a1b26
tab_bar_background      #15161e

# Marks
mark1_foreground #1a1b26
mark1_background #7aa2f7
mark2_foreground #1a1b26
mark2_background #bb9af7
mark3_foreground #1a1b26
mark3_background #7dcfff

