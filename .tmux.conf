#!/usr/bin/env bash

# ── Terminal ──────────────────────────────────────────────────────────────────
set-option -sa terminal-features ',tmux:RGB'
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── General ───────────────────────────────────────────────────────────────────
set -sg escape-time 0
set -g mouse on
set -g focus-events on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g status-position top
set-window-option -g mode-keys vi

# ── Keybinds ──────────────────────────────────────────────────────────────────
unbind %
bind - split-window -h -c "#{pane_current_path}"

unbind '"'
bind _ split-window -v -c "#{pane_current_path}"

bind c new-window -c "#{pane_current_path}"

unbind r
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r m resize-pane -Z

bind-key b set-option status
bind-key w choose-tree -Zw

# ── Copy mode ─────────────────────────────────────────────────────────────────
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

set -g @plugin '2kabhishek/tmux2k'

# ── tmux2k ────────────────────────────────────────────────────────────────────
set -g @tmux2k-theme 'catppuccin'
# Rose Pine Dawn accent overrides for catppuccin named colors
set -g @tmux2k-black '#faf4ed'
set -g @tmux2k-green        '#286983'   # pine  — session, git
set -g @tmux2k-light-green  '#56949f'   # foam  — cpu
set -g @tmux2k-light-purple '#b4637a'   # love  — battery
set -g @tmux2k-purple       '#907aa9'   # iris  — network
set -g @tmux2k-light-blue   '#ea9d34'   # gold  — time
set -g @tmux2k-white '#797593'   # inactive tab
set -g @tmux2k-icons-only true
set -g @tmux2k-military-time false
set -g @tmux2k-show-powerline true
set -g @tmux2k-powerline-style 'round'
set -g @tmux2k-start-icon ""
set -g @tmux2k-left-plugins  "session git cpu"
set -g @tmux2k-right-plugins "battery network time"
set -g @tmux2k-window-list-alignment 'absolute-centre'
set -g @tmux2k-window-list-compact true

# ── TPM bootstrap (keep last) ─────────────────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'
