# =============================================================================
# Rosé Pine Dawn — Starship Prompt
# Palette:
#   base       #faf4ed  (background)
#   surface    #fffaf3
#   overlay    #f2e9e1
#   muted      #9893a5
#   subtle     #797593
#   text       #575279
#   love       #b4637a  (red)
#   gold       #ea9d34  (yellow)
#   rose       #d7827e  (pink)
#   pine       #286983  (cyan/blue)
#   foam       #56949f  (teal)
#   iris       #907aa9  (purple)
#   highlight  #dfdad9
# =============================================================================

format = """
[╭─](fg:#9893a5)\
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$rust\
$nodejs\
$c\
$python\
$cmd_duration\
$line_break\
[╰─](fg:#9893a5)\
$character"""

palette = "rose_pine_dawn"

[palettes.rose_pine_dawn]
base = "#faf4ed"
surface = "#fffaf3"
overlay = "#f2e9e1"
muted = "#9893a5"
subtle = "#797593"
text = "#575279"
love = "#b4637a"
gold = "#ea9d34"
rose = "#d7827e"
pine = "#286983"
foam = "#56949f"
iris = "#907aa9"
highlight = "#dfdad9"

# =============================================================================
# OS icon
# =============================================================================

[os]
disabled = false
format = "[$symbol]($style) "
style = "fg:pine"

[os.symbols]
Linux = ""
Ubuntu = ""
Pop = ""

# =============================================================================
# Directory
# =============================================================================

[directory]
format = "[ $path]($style)[$read_only]($read_only_style) "
style = "fg:foam bold"
read_only = " 󰌾"
read_only_style = "fg:love"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙"
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"src" = " "

# =============================================================================
# Git
# =============================================================================

[git_branch]
format = "[  $branch(:$remote_branch)]($style) "
style = "fg:iris"
truncation_length = 24
truncation_symbol = "…"

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "fg:rose"
conflicted = "󰩌 "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = "? "
stashed = " "
modified = "! "
staged = "+ "
renamed = "» "
deleted = "✘ "

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "fg:gold"

# =============================================================================
# Languages
# =============================================================================

[rust]
format = "[ $version]($style) "
style = "fg:love"
symbol = ""

[nodejs]
format = "[ $version]($style) "
style = "fg:foam"
symbol = "󰎙"

[c]
format = "[ $version]($style) "
style = "fg:gold"
symbol = " "

[python]
format = "[ $version]($style) "
style = "fg:iris"
symbol = " "

# =============================================================================
# Username / Hostname (shown only over SSH)
# =============================================================================

[username]
show_always = false
format = "[$user]($style)@"
style_user = "fg:text bold"
style_root = "fg:love bold"

[hostname]
ssh_only = true
format = "[$hostname]($style) "
style = "fg:pine"

# =============================================================================
# Command duration
# =============================================================================

[cmd_duration]
min_time = 2000
format = "[ $duration]($style) "
style = "fg:muted"

# =============================================================================
# Prompt character
# =============================================================================

[character]
success_symbol = "[❯](fg:pine bold)"
error_symbol = "[❯](fg:love bold)"
vimcmd_symbol = "[❮](fg:iris bold)"
